<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Simple Website</title>

    <!-- CSS -->
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            color: #333;
        }

        button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>

</head>
<body>

    <h1>Welcome to My Website</h1>

    <button onclick="showMessage()">Click Me</button>

    <div id="message"></div>


    <!-- JavaScript -->
    <script>

        function showMessage()
        {
            document.getElementById("message").innerHTML =
            "Hello! You clicked the button 🎉";
        }

    </script>


</body>
</html>
